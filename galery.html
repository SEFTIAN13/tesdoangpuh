<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri XII TKJ 3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="header-wrapper">
            <div class="header">
                <div class="brand">
                    <img src="logo.png" alt="logo" class="logo">
                    <span>TEKNIK KOMPUTER DAN JARINGAN</span>
                </div>
                <nav class="navbar">
                    <a href="index.html">HOME</a>
                    <a href="profil.html">Profil Kelas</a>
                    <a href="galery.html">Galeri</a>
                    <a href="tentang.html">Tentang</a>
                    <a href="hubungi.html">Hubungi kami</a>
                </nav>
            </div>
        </div>

        <div class="content">
            <h2 class="section-title">GALERI KELAS</h2>
            <div class="description">Mengabadikan momen kegiatan kelas XII TKJ 3, pelatihan, dan event akademik.</div>

            <div style="margin-top:20px; margin-bottom:10px;">
                <label for="uploadPhotos" style="font-weight:600;">Unggah Foto Baru:</label><br>
                <input type="file" id="uploadPhotos" accept="image/*" multiple style="margin-top:8px;">
                <div id="uploadNote" style="font-size:14px; color:#1e3a5f; margin-top:6px;">Pilih beberapa file gambar lalu lihat preview langsung di galeri.</div>
            </div>

            <div class="gallery-grid" id="galleryGrid">
                <!-- Gallery akan diisi oleh JavaScript -->
            </div>

            <div class="footer" style="margin-top: 24px;">
                <span>© 2026 - XII TKJ 3 SMKN 1 RANCAEKEK</span>
                <span>🔔 Angkatan 2024</span>
            </div>
        </div>
    </div>
    
    <script>
        const uploadInput = document.getElementById('uploadPhotos');
        const galleryGrid = document.getElementById('galleryGrid');

        // Load saved images from localStorage
        function loadGallery() {
            const savedImages = JSON.parse(localStorage.getItem('galleryImages') || '[]');
            galleryGrid.innerHTML = '';
            savedImages.forEach(imgData => {
                const img = document.createElement('img');
                img.src = imgData;
                img.alt = 'Gallery image';
                img.style.borderRadius = '14px';
                img.style.objectFit = 'cover';
                img.style.height = '180px';
                galleryGrid.appendChild(img);
            });
        }

        // Save images to localStorage
        function saveToLocalStorage(images) {
            localStorage.setItem('galleryImages', JSON.stringify(images));
        }

        uploadInput.addEventListener('change', (event) => {
            const files = event.target.files;
            if (!files.length) return;

            const savedImages = JSON.parse(localStorage.getItem('galleryImages') || '[]');
            const readers = [];

            Array.from(files).forEach(file => {
                if (!file.type.startsWith('image/')) return;
                
                const reader = new FileReader();
                readers.push(new Promise((resolve) => {
                    reader.onload = function(e) {
                        savedImages.push(e.target.result);
                        resolve();
                    };
                    reader.readAsDataURL(file);
                }));
            });

            Promise.all(readers).then(() => {
                saveToLocalStorage(savedImages);
                loadGallery();
                document.getElementById('uploadNote').textContent = 'Foto berhasil ditambahkan! Tersimpan di browser.';
            });
        });

        // Initial load
        loadGallery();
    </script>
</body>
</html>
