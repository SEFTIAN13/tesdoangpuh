<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri XII TKJ 3</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase.config.js"></script>
    <style>
        .main-container {
            background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
            border-radius: 34px;
            padding: 30px;
            border: 1px solid rgba(191, 216, 240, 0.9);
            box-shadow: 0 24px 44px rgba(0,40,80,0.12);
        }

        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            position: relative;
        }
        
        .gallery-header h2 {
            font-size: 32px;
            color: #2c5282;
            font-weight: 700;
            margin: 0;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: max-content;
            text-align: center;
        }
        
        hr {
            border: none;
            border-top: 2px solid #d0e0f0;
            width: 100%;
            margin: 15px 0 25px 0;
        }
        
        .add-button {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0a2a44;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s;
            border: none;
            box-shadow: 0 3px 10px rgba(10,42,68,0.2);
            white-space: nowrap;
            margin-left: auto;
            z-index: 1;
        }
        
        .add-button:hover {
            background: #123456;
            transform: translateY(-2px);
        }
        
        .add-button.disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .gallery-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1/1;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            border: 2px solid white;
            transition: transform 0.2s;
            cursor: pointer;
        }
        
        .gallery-item:hover {
            transform: scale(1.02);
        }
        
        .gallery-item:hover::after {
            content: '\f00e';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .empty-gallery {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            background: #f8fafc;
            border-radius: 16px;
            color: #718096;
        }
        
        .empty-gallery i {
            font-size: 48px;
            color: #d0e0f0;
            margin-bottom: 15px;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #718096;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
        }
        
        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 80vh;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 10px;
        }
        
        .close-modal {
            position: absolute;
            top: 20px;
            right: 35px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            z-index: 1001;
        }
        
        .close-modal:hover {
            color: #ffd700;
        }
        
        .modal-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(5px);
            z-index: 1001;
        }
        
        .modal-btn:hover {
            background: white;
            color: #0a2a44;
        }
        
        .footer {
            margin-top: 30px;
            text-align: center;
            color: #718096;
            font-size: 14px;
            border-top: 1px solid #d0e0f0;
            padding-top: 20px;
        }
        
        @media (max-width: 768px) {
            .main-container {
                border-radius: 26px;
                padding: 22px 16px;
            }

            .gallery-header {
                flex-direction: column;
                gap: 15px;
                min-height: auto;
            }
            
            .gallery-header h2 {
                font-size: 28px;
                position: relative;
                left: auto;
                transform: none;
                width: 100%;
                margin-bottom: 10px;
            }
            
            .add-button {
                align-self: stretch;
                justify-content: center;
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header-wrapper">
            <div class="header">
                <div class="brand">
                    <img src="logo.png" alt="logo" class="logo">
                    <span>TEKNIK KOMPUTER DAN JARINGAN</span>
                </div>
                <nav class="navbar">
                    <a href="index.html">HOME</a>
                    <a href="profil.html">Profil Kelas</a>
                    <a href="galery.html">Galeri</a>
                    <a href="hubungi.html">Hubungi kami</a>
                </nav>
            </div>
        </div>

        <div class="content">
            <div class="main-container">
                <div class="gallery-header">
                    <h2>GALERI KELAS</h2>
                    <label for="uploadPhotos" class="add-button" id="uploadBtn">
                        <i class="fas fa-plus"></i> Tambah Foto
                    </label>
                    <input type="file" id="uploadPhotos" accept="image/*" multiple>
                </div>
                
                <hr>
                
                <div class="gallery-grid" id="galleryGrid">
                    <div class="loading">Memuat galeri...</div>
                </div>
                
                <div class="footer">
                    <span>© 2026 - XII TKJ 3 SMKN 1 RANCAEKEK</span>
                </div>
            </div>
        </div>
    </div>
    
    <div id="imageModal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImage">
        <button class="modal-btn" id="downloadBtn">
            <i class="fas fa-download"></i> Download
        </button>
    </div>
    
    <script>
        // Cek apakah supabase tersedia
        if (typeof window.supabaseClient === 'undefined') {
            alert('Error: Supabase tidak terhubung. Periksa file supabase.config.js');
        }

        const galleryGrid = document.getElementById('galleryGrid');
        const uploadInput = document.getElementById('uploadPhotos');
        const uploadBtn = document.getElementById('uploadBtn');
        
        // Modal elements
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        const closeBtn = document.querySelector('.close-modal');
        const downloadBtn = document.getElementById('downloadBtn');
        let currentImageUrl = '';

        // Load gallery from Supabase
        async function loadGallery() {
            try {
                const { data: images, error } = await window.supabaseClient
                    .from('gallery')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                renderGallery(images || []);
            } catch (error) {
                console.error('Error loading gallery:', error);
                galleryGrid.innerHTML = '<div class="empty-gallery"><i class="fas fa-exclamation-triangle"></i><p>Gagal memuat galeri. Periksa koneksi internet.</p></div>';
            }
        }
        
        function renderGallery(images) {
            if (images.length === 0) {
                galleryGrid.innerHTML = '<div class="empty-gallery"><i class="fas fa-images"></i><p>Belum ada foto. Klik "Tambah Foto" untuk memulai.</p></div>';
                return;
            }
            
            galleryGrid.innerHTML = '';
            images.forEach((image, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                const img = document.createElement('img');
                img.src = image.image_url;
                img.alt = `Foto ${index + 1}`;
                item.appendChild(img);
                item.onclick = () => openModal(image.image_url);
                galleryGrid.appendChild(item);
            });
        }
        
        // Upload foto ke Supabase Storage
        async function uploadGalleryPhoto(file) {
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
            const filePath = `gallery/${fileName}`;
            
            const { data, error } = await window.supabaseClient.storage
                .from('images')
                .upload(filePath, file);
            
            if (error) throw error;
            
            // Get public URL
            const { data: urlData } = window.supabaseClient.storage
                .from('images')
                .getPublicUrl(filePath);
            
            return urlData.publicUrl;
        }
        
        // Upload multiple files
        uploadInput.addEventListener('change', async (e) => {
            const files = e.target.files;
            if (!files.length) return;
            
            uploadBtn.classList.add('disabled');
            const originalText = uploadBtn.innerHTML;
            uploadBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Mengunggah...';
            
            let successCount = 0;
            let failCount = 0;
            
            for (const file of files) {
                if (!file.type.startsWith('image/')) {
                    failCount++;
                    continue;
                }
                
                try {
                    const url = await uploadGalleryPhoto(file);
                    await window.supabaseClient.from('gallery').insert({
                        image_url: url,
                        file_name: file.name
                    });
                    successCount++;
                } catch (error) {
                    console.error('Error uploading:', error);
                    failCount++;
                }
            }
            
            uploadBtn.innerHTML = originalText;
            uploadBtn.classList.remove('disabled');
            uploadInput.value = '';
            
            if (successCount > 0) {
                alert(`${successCount} foto berhasil diunggah!${failCount > 0 ? ` ${failCount} gagal.` : ''}`);
                loadGallery();
            } else if (failCount > 0) {
                alert('Gagal mengunggah foto. Periksa koneksi internet.');
            }
        });
        
        // Modal functions
        function openModal(imgSrc) {
            if (!imgSrc) return;
            modal.style.display = 'block';
            modalImg.src = imgSrc;
            currentImageUrl = imgSrc;
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
        
        function downloadImage() {
            if (!currentImageUrl) return;
            const link = document.createElement('a');
            link.href = currentImageUrl;
            link.download = 'galeri-tkj3-' + Date.now() + '.jpg';
            link.click();
        }
        
        closeBtn.onclick = closeModal;
        downloadBtn.onclick = downloadImage;
        
        window.onclick = (e) => {
            if (e.target === modal) closeModal();
        };
        
        window.onkeydown = (e) => {
            if (e.key === 'Escape' && modal.style.display === 'block') closeModal();
        };
        
        // Initial load
        loadGallery();
    </script>
</body>
</html>
