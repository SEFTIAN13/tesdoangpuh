<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>XII TKJ 3 - Profil Kelas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase.config.js"></script>
    <script src="auth.js"></script>
    <style>
        .profile-shell {
            background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
            border-radius: 34px;
            padding: 30px;
            border: 1px solid rgba(191, 216, 240, 0.9);
            box-shadow: 0 24px 44px rgba(0,40,80,0.12);
        }

        .profile-header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 24px;
            margin-bottom: 14px;
        }

        .wali-kelas-box {
            margin-bottom: 28px;
            background: linear-gradient(180deg, #ffffff 0%, #f4f9ff 100%);
            border: 1px solid #c7dbef;
            border-radius: 24px;
            padding: 20px 24px;
            box-shadow: 0 16px 34px rgba(20, 56, 96, 0.08);
            text-align: center;
        }

        .wali-kelas-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #0a2a44;
            margin-bottom: 18px;
            font-weight: 800;
            text-align: center;
            line-height: 1.1;
        }

        .wali-kelas-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-top: 18px;
        }

        .wali-kelas-card {
            background: #ffffff;
            border: 1px solid #d4e3f1;
            border-radius: 22px;
            padding: 18px;
            box-shadow: 0 12px 24px rgba(20, 56, 96, 0.08);
        }

        .wali-kelas-name {
            font-size: 20px;
            font-weight: 800;
            color: #0a2a44;
            line-height: 1.3;
        }

        .wali-kelas-photo {
            width: 120px;
            height: 120px;
            object-fit: cover;
            display: block;
            margin: 0 auto 14px;
            border-radius: 24px;
            border: 3px solid #d6e6f5;
            box-shadow: 0 12px 24px rgba(20, 56, 96, 0.12);
            background: #eef4fa;
        }

        .wali-kelas-toolbar {
            display: flex;
            justify-content: center;
            margin-top: 16px;
        }

        .wali-kelas-static {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .wali-kelas-list,
        .wali-kelas-toolbar {
            display: none !important;
        }

        .wali-kelas-static-item {
            background: #ffffff;
            border: 1px solid #d4e3f1;
            border-radius: 22px;
            padding: 18px;
            box-shadow: 0 12px 24px rgba(20, 56, 96, 0.08);
        }

        .wali-kelas-static-actions {
            display: flex;
            justify-content: center;
            margin-top: 12px;
        }

        .wali-kelas-actions {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }

        .profile-header .section-title {
            margin-bottom: 0;
            text-align: center;
            border-left: none;
            padding-left: 0;
        }

        .profile-toolbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 24px;
        }

        .add-student-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #0a2a44;
            color: white;
            padding: 12px 22px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            box-shadow: 0 10px 24px rgba(10,42,68,0.22);
        }

        .add-student-btn:hover {
            background: #123456;
            transform: translateY(-2px);
        }

        .add-student-btn:disabled {
            opacity: 0.72;
            cursor: default;
            transform: none;
        }

        body.modal-open {
            overflow: hidden;
        }

        .student-form-modal {
            position: fixed;
            inset: 0;
            z-index: 1200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(7, 23, 38, 0.35);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 1;
            visibility: visible;
            transition: opacity 0.25s ease, visibility 0.25s ease;
        }

        .student-form-modal.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .student-form-panel {
            width: min(760px, 100%);
            max-height: calc(100vh - 48px);
            overflow-y: auto;
            background: linear-gradient(180deg, #f8fbff 0%, #eef5fc 100%);
            padding: 24px;
            border-radius: 26px;
            border: 1px solid rgba(189, 211, 233, 0.95);
            box-shadow: 0 28px 60px rgba(4, 23, 42, 0.22);
        }

        .wali-form-modal {
            position: fixed;
            inset: 0;
            z-index: 1200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(7, 23, 38, 0.35);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 1;
            visibility: visible;
            transition: opacity 0.25s ease, visibility 0.25s ease;
        }

        .wali-form-modal.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .wali-form-panel {
            width: min(520px, 100%);
            background: linear-gradient(180deg, #f8fbff 0%, #eef5fc 100%);
            padding: 24px;
            border-radius: 26px;
            border: 1px solid rgba(189, 211, 233, 0.95);
            box-shadow: 0 28px 60px rgba(4, 23, 42, 0.22);
        }

        .wali-form-grid {
            display: grid;
            gap: 14px;
        }

        .student-form-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .student-form-title {
            font-size: 18px;
            font-weight: 700;
            color: #0a2a44;
        }

        .close-form-btn {
            border: none;
            background: #e8f0fa;
            color: #0a2a44;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }

        .student-form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px 16px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-field.full {
            grid-column: 1 / -1;
        }

        .form-field label {
            color: #0a2a44;
            font-weight: 600;
        }

        .form-field input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #a0b8d0;
            border-radius: 12px;
            background: white;
            font-size: 15px;
        }

        .form-actions {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .member-card-actions {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: auto;
            padding-top: 12px;
        }

        .edit-student-btn {
            border: 1px solid #c9d9e9;
            background: #eef5fc;
            color: #0a2a44;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .edit-student-btn:hover {
            background: #dbe9f7;
            transform: translateY(-1px);
        }

        .delete-student-btn {
            border: 1px solid #f1c0c0;
            background: #fff3f3;
            color: #9b2c2c;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .delete-student-btn:hover {
            background: #ffe1e1;
            transform: translateY(-1px);
        }

        .member-card {
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 1px solid #dce8f4;
            border-radius: 22px;
            background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
            padding: 18px 16px 16px;
            box-shadow: 0 18px 34px rgba(20, 56, 96, 0.12);
            min-height: 100%;
        }

        .member-card:hover {
            transform: translateY(-5px);
        }

        .member-card img {
            width: 100%;
            aspect-ratio: 4 / 5;
            height: auto;
            object-fit: cover;
            border-radius: 18px;
            margin-bottom: 16px;
            box-shadow: 0 10px 22px rgba(18, 52, 86, 0.14);
            background: #eef4fa;
        }

        .member-card h3 {
            margin: 0 0 8px;
            font-size: 16px;
            line-height: 1.45;
            color: #16496f;
            font-weight: 800;
            text-transform: uppercase;
        }

        .member-card p {
            margin: 0;
            color: #4a5f75;
            font-size: 14px;
            line-height: 1.55;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #718096;
        }

        .photo-preview {
            margin-top: 10px;
            max-width: 120px;
            border-radius: 12px;
        }

        .upload-status {
            color: #1e3a5f;
        }

        .upload-status.loading {
            color: #f39c12;
        }

        .upload-status.success {
            color: #27ae60;
        }

        .upload-status.error {
            color: #e74c3c;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 80vh;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 10px;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 35px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            z-index: 1001;
        }

        .close-modal:hover {
            color: #ffd700;
        }

        .modal-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(5px);
            z-index: 1001;
        }

        .modal-btn:hover {
            background: white;
            color: #0a2a44;
        }

        @media (max-width: 768px) {
            .profile-shell {
                border-radius: 24px;
                padding: 18px 12px;
            }

            .wali-kelas-box {
                margin-bottom: 20px;
                padding: 16px 12px;
                border-radius: 20px;
            }

            .wali-kelas-static {
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 10px;
                margin-top: 12px;
            }

            .wali-kelas-static-item {
                padding: 12px 8px;
                border-radius: 16px;
            }

            .wali-kelas-photo {
                width: 64px;
                height: 64px;
                border-radius: 16px;
                margin-bottom: 10px;
            }

            .wali-kelas-name {
                font-size: 10px;
                line-height: 1.35;
                word-break: break-word;
            }

            .wali-kelas-label {
                font-size: 22px;
                margin-bottom: 14px;
            }

            .wali-kelas-static-actions {
                margin-top: 8px;
            }

            .wali-kelas-static-actions .edit-student-btn {
                padding: 6px 10px;
                font-size: 11px;
            }

            .add-student-btn {
                width: 100%;
                padding: 11px 16px;
                font-size: 14px;
            }

            .profile-toolbar {
                justify-content: stretch;
                margin-bottom: 18px;
            }

            .profile-filter-bar {
                display: grid;
                grid-template-columns: 1fr;
            }

            .profile-filter-input,
            .profile-filter-select,
            .profile-filter-reset {
                width: 100%;
            }

            .profile-header {
                margin-top: 12px;
                margin-bottom: 10px;
            }

            .profile-header .section-title {
                font-size: 24px;
                padding-left: 0;
                border-left: none;
            }

            .member-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 12px;
                margin-top: 8px;
            }

            .member-card {
                padding: 12px 10px;
                border-radius: 18px;
            }

            .member-card img {
                height: auto;
                margin-bottom: 12px;
                border-radius: 14px;
            }

            .member-card h3 {
                font-size: 12px;
                margin: 0 0 6px;
            }

            .member-card p {
                font-size: 10px;
                line-height: 1.45;
            }

            .member-card-actions {
                gap: 6px;
                margin-top: 8px;
                padding-top: 10px;
            }

            .member-card-actions .edit-student-btn,
            .member-card-actions .delete-student-btn {
                padding: 6px 10px;
                font-size: 11px;
            }

            .footer[style] {
                margin-top: 18px !important;
            }

            .student-form-modal {
                padding: 16px;
            }

            .student-form-panel {
                padding: 18px;
                border-radius: 22px;
            }

            .student-form-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 420px) {
            .wali-kelas-static {
                grid-template-columns: repeat(3, minmax(84px, 1fr));
            }

            .member-grid {
                grid-template-columns: 1fr;
            }

            .member-card img {
                height: 170px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header-wrapper">
            <div class="header">
                <div class="brand">
                    <img src="logo-sekolah-transparent.png" alt="Logo SMKN 1 Rancaekek" class="logo">
                    <span>TEKNIK KOMPUTER DAN JARINGAN</span>
                </div>
                <div class="header-actions">
                    <nav class="navbar">
                        <a href="index.html">HOME</a>
                        <a href="profil.html">Profil Kelas</a>
                        <a href="galery.html">Galeri</a>
                        <a href="hubungi.html">Hubungi kami</a>
                    </nav>
                    <button type="button" class="auth-toggle" id="authToggle">Login</button>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="profile-shell">
                <div class="wali-kelas-box">
                    <div class="wali-kelas-label">Wali Kelas</div>
                    <div class="wali-kelas-static">
                        <div class="wali-kelas-static-item">
                            <img class="wali-kelas-photo" src="https://placehold.co/300x300/e6f0fa/0a2a44?text=Wali+Kelas+1" alt="Foto Wali Kelas 1" data-wali-photo>
                            <div class="wali-kelas-name" data-wali-name>HERA FRANSISKA, M.T.I</div>
                            <div class="wali-kelas-static-actions">
                                <button type="button" class="edit-student-btn" data-edit-wali="0">Edit</button>
                            </div>
                        </div>
                        <div class="wali-kelas-static-item">
                            <img class="wali-kelas-photo" src="https://placehold.co/300x300/e6f0fa/0a2a44?text=Wali+Kelas+2" alt="Foto Wali Kelas 2" data-wali-photo>
                            <div class="wali-kelas-name" data-wali-name>DEWI LESTARI, S.Pd</div>
                            <div class="wali-kelas-static-actions">
                                <button type="button" class="edit-student-btn" data-edit-wali="1">Edit</button>
                            </div>
                        </div>
                        <div class="wali-kelas-static-item">
                            <img class="wali-kelas-photo" src="https://placehold.co/300x300/e6f0fa/0a2a44?text=Wali+Kelas+3" alt="Foto Wali Kelas 3" data-wali-photo>
                            <div class="wali-kelas-name" data-wali-name>ANDI HARTONO, S.Kom</div>
                            <div class="wali-kelas-static-actions">
                                <button type="button" class="edit-student-btn" data-edit-wali="2">Edit</button>
                            </div>
                        </div>
                    </div>
                    <div class="wali-kelas-list" id="waliKelasList"></div>
                    <div class="wali-kelas-toolbar">
                        <button type="button" class="add-student-btn" id="toggleWaliForm">
                            <i class="fas fa-user-plus"></i> Tambah Wali Kelas
                        </button>
                    </div>
                </div>

                <div class="profile-header">
                    <h2 class="section-title">SISWA</h2>
                </div>

                <div class="profile-toolbar">
                    <button type="button" class="add-student-btn" id="toggleStudentForm">
                        <i class="fas fa-user-plus"></i> Tambah Siswa
                    </button>
                </div>

                <div class="member-grid" id="memberGrid">
                    <div class="loading">Memuat data...</div>
                </div>
                <div class="footer" style="margin-top:24px;">
                    <span>&copy; 2026 - XII TKJ 3 SMKN 1 RANCAEKEK</span>
                    <span>Angkatan 2026</span>
                </div>
            </div>
        </div>
    </div>

    <div class="student-form-modal hidden" id="studentFormModal" aria-hidden="true">
        <div class="student-form-panel" id="studentFormPanel">
            <div class="student-form-top">
                <div class="student-form-title" id="studentFormTitle">Tambah Profil Siswa</div>
                <button type="button" class="close-form-btn" id="closeStudentForm" aria-label="Tutup form">&times;</button>
            </div>
            <form id="addStudentForm">
                <div class="student-form-grid">
                    <div class="form-field">
                        <label for="studentName">Nama</label>
                        <input type="text" id="studentName" required>
                    </div>

                    <div class="form-field full">
                        <label for="studentPhotoFile">Foto (Upload)</label>
                        <input type="file" id="studentPhotoFile" accept="image/*">
                        <div id="photoPreview" style="margin-top:8px; display:none;">
                            <img id="previewImg" class="photo-preview" alt="Preview">
                        </div>
                    </div>

                    <div class="form-field">
                        <label for="studentDream">Cita-cita</label>
                        <input type="text" id="studentDream" placeholder="Contoh: Network Engineer">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="add-student-btn" id="submitStudentForm">Simpan Profil</button>
                    <span id="addStatus" class="upload-status"></span>
                </div>
            </form>
        </div>
    </div>

    <div class="wali-form-modal hidden" id="waliFormModal" aria-hidden="true">
        <div class="wali-form-panel">
            <div class="student-form-top">
                <div class="student-form-title">Ubah Wali Kelas</div>
                <button type="button" class="close-form-btn" id="closeWaliForm" aria-label="Tutup form wali">&times;</button>
            </div>
            <form id="waliForm">
                <div class="wali-form-grid">
                    <div class="form-field">
                        <label for="waliName">Nama</label>
                        <input type="text" id="waliName" required>
                    </div>
                    <div class="form-field">
                        <label for="waliPhotoFile">Foto (Upload)</label>
                        <input type="file" id="waliPhotoFile" accept="image/*">
                        <div id="waliPhotoPreview" style="margin-top:8px; display:none;">
                            <img id="waliPreviewImg" class="photo-preview" alt="Preview Wali">
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="add-student-btn">Simpan Wali Kelas</button>
                    <span id="waliStatus" class="upload-status"></span>
                </div>
            </form>
        </div>
    </div>

    <div id="imageModal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImage">
        <button class="modal-btn" id="downloadBtn">
            <i class="fas fa-download"></i> Download
        </button>
    </div>

    <script>
        if (typeof window.supabaseClient === 'undefined') {
            alert('Error: Supabase tidak terhubung. Periksa file supabase.config.js');
        }

        const memberGrid = document.getElementById('memberGrid');
        const waliKelasList = document.getElementById('waliKelasList');
        const toggleWaliFormBtn = document.getElementById('toggleWaliForm');
        const waliFormModal = document.getElementById('waliFormModal');
        const closeWaliFormBtn = document.getElementById('closeWaliForm');
        const waliForm = document.getElementById('waliForm');
        const waliNameInput = document.getElementById('waliName');
        const waliPhotoFile = document.getElementById('waliPhotoFile');
        const waliPhotoPreview = document.getElementById('waliPhotoPreview');
        const waliPreviewImg = document.getElementById('waliPreviewImg');
        const waliStatus = document.getElementById('waliStatus');
        const studentFormModal = document.getElementById('studentFormModal');
        const studentFormPanel = document.getElementById('studentFormPanel');
        const toggleStudentFormBtn = document.getElementById('toggleStudentForm');
        const closeStudentFormBtn = document.getElementById('closeStudentForm');
        const form = document.getElementById('addStudentForm');
        const studentFormTitle = document.getElementById('studentFormTitle');
        const submitStudentForm = document.getElementById('submitStudentForm');
        const statusSpan = document.getElementById('addStatus');
        const studentPhotoFile = document.getElementById('studentPhotoFile');
        const photoPreview = document.getElementById('photoPreview');
        const previewImg = document.getElementById('previewImg');

        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        const closeBtn = document.querySelector('.close-modal');
        const downloadBtn = document.getElementById('downloadBtn');
        let currentImageUrl = '';
        let editingStudentId = null;
        let editingStudentPhotoUrl = '';
        const waliStorageKey = 'xii_tkj3_wali_kelas';
        const defaultWaliKelas = [];

        function applyAdminView() {
            const isAdmin = typeof window.isAdminLoggedIn === 'function' && window.isAdminLoggedIn();
            toggleStudentFormBtn.style.display = isAdmin ? 'inline-flex' : 'none';
            toggleWaliFormBtn.style.display = isAdmin ? 'inline-flex' : 'none';
        }

        function loadWaliKelas() {
            let waliData = defaultWaliKelas;
            try {
                const stored = localStorage.getItem(waliStorageKey);
                if (stored) {
                    waliData = JSON.parse(stored);
                }
            } catch (error) {
                console.warn('Gagal membaca data wali kelas:', error);
            }

            waliKelasList.innerHTML = '';

            if (!waliData || waliData.length === 0) {
                waliKelasList.innerHTML = '<div style="grid-column:1/-1;color:#355574;text-align:center;padding:18px;">Belum ada data wali kelas.</div>';
                return;
            }

            waliData.forEach((wali, index) => {
                const card = document.createElement('div');
                card.className = 'wali-kelas-card';
                card.innerHTML = `
                    <img class="wali-kelas-photo" src="${wali.photo_url || 'https://placehold.co/300x300/e6f0fa/0a2a44?text=Wali+Kelas'}" alt="${wali.name}">
                    <div class="wali-kelas-name">${wali.name}</div>
                    ${typeof window.isAdminLoggedIn === 'function' && window.isAdminLoggedIn() ? `<div class="wali-kelas-actions"><button type="button" class="delete-student-btn" data-index="${index}">Hapus</button></div>` : ''}
                `;

                const deleteBtn = card.querySelector('.delete-student-btn');
                if (deleteBtn) {
                    deleteBtn.addEventListener('click', () => {
                        deleteWaliKelas(index);
                    });
                }

                waliKelasList.appendChild(card);
            });
        }

        function openWaliForm() {
            if (typeof window.requireAdminAccess === 'function' && !window.requireAdminAccess()) {
                return;
            }
            loadWaliKelas();
            waliStatus.textContent = '';
            waliStatus.className = 'upload-status';
            waliForm.reset();
            waliPhotoPreview.style.display = 'none';
            waliFormModal.classList.remove('hidden');
            waliFormModal.setAttribute('aria-hidden', 'false');
            document.body.classList.add('modal-open');
            waliNameInput.focus();
        }

        function closeWaliForm() {
            waliFormModal.classList.add('hidden');
            waliFormModal.setAttribute('aria-hidden', 'true');
            waliStatus.textContent = '';
            waliStatus.className = 'upload-status';
            waliPhotoFile.value = '';
            if (studentFormModal.classList.contains('hidden') && modal.style.display !== 'block') {
                document.body.classList.remove('modal-open');
            }
        }

        function resetStudentFormState() {
            form.reset();
            editingStudentId = null;
            editingStudentPhotoUrl = '';
            studentFormTitle.textContent = 'Tambah Profil Siswa';
            submitStudentForm.innerHTML = 'Simpan Profil';
            photoPreview.style.display = 'none';
            previewImg.removeAttribute('src');
            statusSpan.textContent = '';
            statusSpan.className = 'upload-status';
        }

        function openStudentForm() {
            if (typeof window.requireAdminAccess === 'function' && !window.requireAdminAccess()) {
                return;
            }
            if (!editingStudentId) {
                resetStudentFormState();
            }
            studentFormModal.classList.remove('hidden');
            studentFormModal.setAttribute('aria-hidden', 'false');
            document.body.classList.add('modal-open');
            document.getElementById('studentName').focus();
        }

        function openEditStudentForm(student) {
            if (typeof window.requireAdminAccess === 'function' && !window.requireAdminAccess()) {
                return;
            }
            resetStudentFormState();
            editingStudentId = student.id;
            editingStudentPhotoUrl = student.photo_url || '';
            studentFormTitle.textContent = 'Edit Profil Siswa';
            submitStudentForm.innerHTML = 'Update Profil';
            document.getElementById('studentName').value = student.name || '';
            document.getElementById('studentDream').value = student.dream === 'Belum diisi' ? '' : (student.dream || '');

            if (editingStudentPhotoUrl) {
                previewImg.src = editingStudentPhotoUrl;
                photoPreview.style.display = 'block';
            }

            openStudentForm();
        }

        function closeStudentForm() {
            studentFormModal.classList.add('hidden');
            studentFormModal.setAttribute('aria-hidden', 'true');
            resetStudentFormState();
            if (modal.style.display !== 'block') {
                document.body.classList.remove('modal-open');
            }
        }

        async function loadStudents() {
            memberGrid.innerHTML = '<div class="loading">Memuat data...</div>';

            try {
                const { data: students, error } = await window.supabaseClient
                    .from('students')
                    .select('*')
                    .order('created_at', { ascending: false });
                if (error) throw error;

                renderStudents(students || []);
            } catch (error) {
                console.error('Error loading students:', error);
                memberGrid.innerHTML = '<div class="loading">Gagal memuat data. Periksa koneksi internet.</div>';
            }
        }

        function renderStudents(students) {
            if (!students || students.length === 0) {
                memberGrid.innerHTML = '<div style="grid-column:1/-1;color:#1e3a5f;text-align:center;padding:40px;">Belum ada profil siswa. Klik "Tambah Siswa" untuk menambahkan.</div>';
                return;
            }

            memberGrid.innerHTML = '';
            students.forEach((student) => {
                const card = document.createElement('div');
                card.className = 'member-card';
                card.innerHTML = `
                    <img src="${student.photo_url || 'https://placehold.co/300x200/e6f0fa/0a2a44?text=No+Image'}" alt="${student.name}">
                    <h3>${student.name}</h3>
                    <p>Cita-cita: ${student.dream || 'Belum diisi'}</p>
                    <div class="member-card-actions">
                        ${typeof window.isAdminLoggedIn === 'function' && window.isAdminLoggedIn() ? '<button type="button" class="edit-student-btn">Edit</button><button type="button" class="delete-student-btn">Hapus</button>' : ''}
                    </div>
                `;
                card.onclick = () => openModal(student.photo_url, student.name);
                const editBtn = card.querySelector('.edit-student-btn');
                const deleteBtn = card.querySelector('.delete-student-btn');
                if (editBtn) {
                    editBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openEditStudentForm(student);
                    });
                }
                if (deleteBtn) {
                    deleteBtn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        await deleteStudent(student);
                    });
                }
                memberGrid.appendChild(card);
            });
        }

        async function uploadPhoto(file) {
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
            const filePath = `students/${fileName}`;

            const { error } = await window.supabaseClient.storage
                .from('images')
                .upload(filePath, file);

            if (error) throw error;

            const { data: urlData } = window.supabaseClient.storage
                .from('images')
                .getPublicUrl(filePath);

            return urlData.publicUrl;
        }

        waliForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (typeof window.requireAdminAccess === 'function' && !window.requireAdminAccess()) {
                return;
            }

            const name = waliNameInput.value.trim();
            const photoFile = waliPhotoFile.files[0];

            if (!name) {
                waliStatus.textContent = 'Nama wajib diisi!';
                waliStatus.className = 'upload-status error';
                return;
            }

            waliStatus.textContent = 'Menyimpan data...';
            waliStatus.className = 'upload-status loading';

            try {
                let photoUrl = 'https://placehold.co/300x300/e6f0fa/0a2a44?text=Wali+Kelas';
                if (photoFile) {
                    photoUrl = await uploadPhoto(photoFile);
                }

                let waliData = [];
                try {
                    const stored = localStorage.getItem(waliStorageKey);
                    if (stored) {
                        waliData = JSON.parse(stored);
                    }
                } catch (storageError) {
                    console.warn('Gagal membaca storage wali kelas:', storageError);
                }

                waliData.push({
                    name: name,
                    photo_url: photoUrl
                });

                localStorage.setItem(waliStorageKey, JSON.stringify(waliData));

                loadWaliKelas();
                closeWaliForm();
            } catch (error) {
                console.error('Error saving wali kelas:', error);
                waliStatus.textContent = 'Gagal menyimpan wali kelas.';
                waliStatus.className = 'upload-status error';
            }
        });

        function deleteWaliKelas(index) {
            if (typeof window.requireAdminAccess === 'function' && !window.requireAdminAccess()) {
                return;
            }

            const confirmed = window.confirm('Hapus data wali kelas ini?');
            if (!confirmed) return;

            try {
                let waliData = [];
                const stored = localStorage.getItem(waliStorageKey);
                if (stored) {
                    waliData = JSON.parse(stored);
                }

                waliData.splice(index, 1);
                localStorage.setItem(waliStorageKey, JSON.stringify(waliData));
                loadWaliKelas();
            } catch (error) {
                console.error('Gagal menghapus wali kelas:', error);
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (typeof window.requireAdminAccess === 'function' && !window.requireAdminAccess()) {
                return;
            }

            const name = document.getElementById('studentName').value.trim();
            const dream = document.getElementById('studentDream').value.trim();
            const photoFile = studentPhotoFile.files[0];

            if (!name) {
                statusSpan.textContent = 'Nama wajib diisi!';
                statusSpan.className = 'upload-status error';
                return;
            }

            statusSpan.textContent = 'Mengupload foto...';
            statusSpan.className = 'upload-status loading';

            try {
                let photoUrl = editingStudentPhotoUrl || 'https://placehold.co/300x200/e6f0fa/0a2a44?text=No+Image';

                if (photoFile) {
                    photoUrl = await uploadPhoto(photoFile);
                }

                statusSpan.textContent = 'Menyimpan data...';

                let error;
                if (editingStudentId) {
                    ({ error } = await window.supabaseClient
                        .from('students')
                        .update({
                            name: name,
                            dream: dream || 'Belum diisi',
                            photo_url: photoUrl
                        })
                        .eq('id', editingStudentId));
                } else {
                    ({ error } = await window.supabaseClient.from('students').insert({
                        name: name,
                        role: 'Siswa',
                        social: 'Tidak ada',
                        dream: dream || 'Belum diisi',
                        photo_url: photoUrl
                    }));
                }

                if (error) throw error;

                closeStudentForm();
                loadStudents();
            } catch (error) {
                console.error('Error adding student:', error);
                statusSpan.textContent = 'Gagal menyimpan: ' + error.message;
                statusSpan.className = 'upload-status error';
            }
        });

        studentPhotoFile.addEventListener('change', (e) => {
            const file = e.target.files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    previewImg.src = event.target.result;
                    photoPreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else {
                photoPreview.style.display = 'none';
            }
        });

        waliPhotoFile.addEventListener('change', (e) => {
            const file = e.target.files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    waliPreviewImg.src = event.target.result;
                    waliPhotoPreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        function openModal(imgSrc) {
            if (!imgSrc) return;
            modal.style.display = 'block';
            modalImg.src = imgSrc;
            currentImageUrl = imgSrc;
            document.body.classList.add('modal-open');
        }

        function closeModal() {
            modal.style.display = 'none';
            if (studentFormModal.classList.contains('hidden')) {
                document.body.classList.remove('modal-open');
            }
        }

        function extractStorageTarget(url) {
            const parsedUrl = new URL(url);
            const segments = parsedUrl.pathname.split('/').filter(Boolean);
            const accessIndex = segments.findIndex((segment) => segment === 'public' || segment === 'authenticated');

            if (accessIndex === -1 || !segments[accessIndex + 1]) {
                throw new Error('URL storage tidak valid');
            }

            return {
                bucket: segments[accessIndex + 1],
                path: segments.slice(accessIndex + 2).join('/')
            };
        }

        async function deleteStudent(student) {
            if (typeof window.requireAdminAccess === 'function' && !window.requireAdminAccess()) {
                return;
            }
            const confirmed = window.confirm(`Hapus profil ${student.name}?`);
            if (!confirmed) return;

            try {
                const { error } = await window.supabaseClient
                    .from('students')
                    .delete()
                    .eq('id', student.id);

                if (error) throw error;

                if (student.photo_url && !student.photo_url.includes('placehold.co')) {
                    try {
                        const { bucket, path } = extractStorageTarget(student.photo_url);
                        await window.supabaseClient.storage.from(bucket).remove([path]);
                    } catch (storageError) {
                        console.warn('Gagal menghapus file foto student:', storageError);
                    }
                }

                if (editingStudentId === student.id) {
                    closeStudentForm();
                }

                if (currentImageUrl === student.photo_url) {
                    closeModal();
                }

                loadStudents();
            } catch (error) {
                console.error('Error deleting student:', error);
                alert('Gagal menghapus profil siswa.');
            }
        }

        async function downloadImage() {
            if (!currentImageUrl) return;

            try {
                downloadBtn.disabled = true;
                downloadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mengunduh...';
                const { bucket, path } = extractStorageTarget(currentImageUrl);
                const extension = currentImageUrl.split('.').pop()?.split('?')[0] || 'jpg';
                const filename = `student-photo-${Date.now()}.${extension}`;
                const { data, error } = await window.supabaseClient.storage
                    .from(bucket)
                    .download(path);

                if (error) {
                    throw error;
                }

                const blobUrl = URL.createObjectURL(data);
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                link.remove();
                URL.revokeObjectURL(blobUrl);
            } catch (error) {
                console.error('Error downloading image:', error);
                alert('Download gagal. Coba lagi sebentar.');
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = '<i class="fas fa-download"></i> Download';
            }
        }

        closeBtn.onclick = closeModal;
        downloadBtn.onclick = downloadImage;
        toggleStudentFormBtn.addEventListener('click', openStudentForm);
        closeStudentFormBtn.addEventListener('click', closeStudentForm);
        toggleWaliFormBtn.addEventListener('click', openWaliForm);
        closeWaliFormBtn.addEventListener('click', closeWaliForm);

        studentFormModal.addEventListener('click', (e) => {
            if (e.target === studentFormModal) closeStudentForm();
        });

        waliFormModal.addEventListener('click', (e) => {
            if (e.target === waliFormModal) closeWaliForm();
        });

        window.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !studentFormModal.classList.contains('hidden')) {
                closeStudentForm();
            }

            if (e.key === 'Escape' && !waliFormModal.classList.contains('hidden')) {
                closeWaliForm();
            }

            if (e.key === 'Escape' && modal.style.display === 'block') {
                closeModal();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            applyAdminView();
            loadWaliKelas();
        });

        window.addEventListener('authchange', () => {
            applyAdminView();
            loadWaliKelas();
            loadStudents();
        });

        loadStudents();
    </script>
    <script>
        (function () {
            const waliStorageKey = 'xii_tkj3_wali_static_cards';
            const waliFormModal = document.getElementById('waliFormModal');
            const closeWaliFormBtn = document.getElementById('closeWaliForm');
            const waliForm = document.getElementById('waliForm');
            const waliNameInput = document.getElementById('waliName');
            const waliPhotoFile = document.getElementById('waliPhotoFile');
            const waliPhotoPreview = document.getElementById('waliPhotoPreview');
            const waliPreviewImg = document.getElementById('waliPreviewImg');
            const waliStatus = document.getElementById('waliStatus');
            const waliNameEls = Array.from(document.querySelectorAll('[data-wali-name]'));
            const waliPhotoEls = Array.from(document.querySelectorAll('[data-wali-photo]'));
            const editButtons = Array.from(document.querySelectorAll('[data-edit-wali]'));
            let activeWaliIndex = null;

            if (!waliFormModal || !waliForm || !waliNameInput || !waliPhotoFile) {
                return;
            }

            function getDefaultWaliData() {
                return waliNameEls.map((el, index) => ({
                    name: el.textContent.trim(),
                    photo_url: waliPhotoEls[index]?.getAttribute('src') || 'https://placehold.co/300x300/e6f0fa/0a2a44?text=Wali+Kelas'
                }));
            }

            function getWaliData() {
                const defaults = getDefaultWaliData();
                try {
                    const stored = localStorage.getItem(waliStorageKey);
                    if (!stored) return defaults;
                    const parsed = JSON.parse(stored);
                    return Array.isArray(parsed) && parsed.length ? parsed : defaults;
                } catch (error) {
                    console.warn('Gagal membaca data wali kelas statis:', error);
                    return defaults;
                }
            }

            function saveWaliData(data) {
                localStorage.setItem(waliStorageKey, JSON.stringify(data));
            }

            function renderWaliData() {
                const data = getWaliData();
                data.forEach((wali, index) => {
                    if (waliNameEls[index]) waliNameEls[index].textContent = wali.name;
                    if (waliPhotoEls[index]) waliPhotoEls[index].src = wali.photo_url;
                });

                const isAdmin = typeof window.isAdminLoggedIn === 'function' && window.isAdminLoggedIn();
                editButtons.forEach((button) => {
                    button.style.display = isAdmin ? 'inline-flex' : 'none';
                });
            }

            function openWaliEditor(index) {
                if (typeof window.requireAdminAccess === 'function' && !window.requireAdminAccess()) {
                    return;
                }

                const data = getWaliData();
                const current = data[index];
                if (!current) return;

                activeWaliIndex = index;
                waliNameInput.value = current.name || '';
                waliPreviewImg.src = current.photo_url || '';
                waliPhotoPreview.style.display = current.photo_url ? 'block' : 'none';
                waliPhotoFile.value = '';
                waliStatus.textContent = '';
                waliStatus.className = 'upload-status';
                waliFormModal.classList.remove('hidden');
                waliFormModal.setAttribute('aria-hidden', 'false');
                document.body.classList.add('modal-open');
                waliNameInput.focus();
            }

            function closeWaliEditor() {
                activeWaliIndex = null;
                waliFormModal.classList.add('hidden');
                waliFormModal.setAttribute('aria-hidden', 'true');
                waliStatus.textContent = '';
                waliStatus.className = 'upload-status';
                waliForm.reset();
                waliPhotoPreview.style.display = 'none';
                if (document.getElementById('studentFormModal').classList.contains('hidden') && document.getElementById('imageModal').style.display !== 'block') {
                    document.body.classList.remove('modal-open');
                }
            }

            editButtons.forEach((button) => {
                button.addEventListener('click', () => {
                    openWaliEditor(Number(button.dataset.editWali));
                });
            });

            closeWaliFormBtn?.addEventListener('click', closeWaliEditor);

            waliFormModal.addEventListener('click', (e) => {
                if (e.target === waliFormModal) closeWaliEditor();
            });

            waliPhotoFile.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) {
                    waliPhotoPreview.style.display = 'none';
                    return;
                }

                const reader = new FileReader();
                reader.onload = (event) => {
                    waliPreviewImg.src = event.target.result;
                    waliPhotoPreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            });

            waliForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                if (typeof window.requireAdminAccess === 'function' && !window.requireAdminAccess()) {
                    return;
                }

                if (activeWaliIndex === null) return;

                const name = waliNameInput.value.trim();
                const photoFile = waliPhotoFile.files[0];
                if (!name) {
                    waliStatus.textContent = 'Nama wajib diisi!';
                    waliStatus.className = 'upload-status error';
                    return;
                }

                waliStatus.textContent = 'Menyimpan data...';
                waliStatus.className = 'upload-status loading';

                try {
                    const data = getWaliData();
                    let photoUrl = data[activeWaliIndex]?.photo_url || waliPhotoEls[activeWaliIndex]?.src || '';

                    if (photoFile && typeof uploadPhoto === 'function') {
                        photoUrl = await uploadPhoto(photoFile);
                    }

                    data[activeWaliIndex] = { name, photo_url: photoUrl };
                    saveWaliData(data);
                    renderWaliData();
                    closeWaliEditor();
                } catch (error) {
                    console.error('Gagal menyimpan wali kelas:', error);
                    waliStatus.textContent = 'Gagal menyimpan data.';
                    waliStatus.className = 'upload-status error';
                }
            });

            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && !waliFormModal.classList.contains('hidden')) {
                    closeWaliEditor();
                }
            });

            window.addEventListener('authchange', renderWaliData);
            document.addEventListener('DOMContentLoaded', renderWaliData);
            renderWaliData();
        })();
    </script>
</body>
</html>
